name: Release Pipeline

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Java 17
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.jks

      - name: Build release APK
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=release.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true

  release-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum

      - name: Build all platforms
        run: |
          cd agent
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o servercontrol-agent-linux-amd64 .
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o servercontrol-agent-linux-arm64 .
          GOOS=linux GOARCH=arm GOARM=7 go build -ldflags="-s -w" -o servercontrol-agent-linux-armv7 .

      - name: Create checksums
        run: cd agent && sha256sum servercontrol-agent-* > SHA256SUMS.txt

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: |
            agent/servercontrol-agent-linux-amd64
            agent/servercontrol-agent-linux-arm64
            agent/servercontrol-agent-linux-armv7
            agent/SHA256SUMS.txt
          generate_release_notes: true

  update-install-script:
    runs-on: ubuntu-latest
    needs: release-agent

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version in install.sh
        run: |
          sed -i 's/VERSION="dev"/VERSION="${{ github.ref_name }}"/' agent/install.sh

      - name: Download release checksums to verify
        run: |
          gh release download ${{ github.ref_name }} --pattern SHA256SUMS.txt --dir /tmp/verify
          echo "Checksums from release:"
          cat /tmp/verify/SHA256SUMS.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push updated install.sh
        uses: actions/github-script@v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = 'agent/install.sh';
            const content = fs.readFileSync(path, 'utf8');
            const encoded = Buffer.from(content).toString('base64');

            const { data: currentFile } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: path,
              ref: 'main',
            });

            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: path,
              message: `chore: update install.sh version to ${{ github.ref_name }}`,
              content: encoded,
              sha: currentFile.sha,
              branch: 'main',
            });
