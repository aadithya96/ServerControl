name: Go Agent CI

on:
  push:
    paths:
      - 'agent/**'
  pull_request:
    paths:
      - 'agent/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum

      - name: Tidy and build
        run: cd agent && go mod tidy && go build ./... && echo "Build OK"

      - name: Vet
        run: cd agent && go vet ./...

      - name: Run tests
        run: cd agent && go test ./... -v

  cross-compile:
    runs-on: ubuntu-latest
    needs: build

    strategy:
      matrix:
        include:
          - GOOS: linux
            GOARCH: amd64
            name: linux-amd64
          - GOOS: linux
            GOARCH: arm64
            name: linux-arm64
          - GOOS: linux
            GOARCH: arm
            GOARM: 7
            name: linux-armv7

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum

      - name: Build binary
        env:
          GOOS: ${{ matrix.GOOS }}
          GOARCH: ${{ matrix.GOARCH }}
          GOARM: ${{ matrix.GOARM }}
        run: |
          cd agent && GOOS=${{ matrix.GOOS }} GOARCH=${{ matrix.GOARCH }} go build -ldflags="-s -w" -o servercontrol-agent-${{ matrix.name }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-${{ matrix.name }}
          path: agent/servercontrol-agent-${{ matrix.name }}
