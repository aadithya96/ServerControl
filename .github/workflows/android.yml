name: Android CI

on:
  push:
    branches:
      - main

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lint is intentionally omitted here — it runs on every PR in pr-checks.yml
  build:
    name: Build Debug APK
    runs-on: self-hosted
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Java 17
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --parallel --build-cache --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk

  test:
    name: Unit Tests
    runs-on: self-hosted
    timeout-minutes: 20
    permissions:
      checks: write
      contents: read
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Java 17
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon --parallel --build-cache --stacktrace

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: app/build/reports/tests/

      - name: Publish test report
        uses: dorny/test-reporter@v3.0.0
        if: always()
        with:
          name: Unit Tests
          reporter: java-junit
          path: app/build/test-results/**/*.xml
          fail-on-error: 'false'
