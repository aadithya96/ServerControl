name: PR Quality Checks

on:
  pull_request:
    branches:
      - main

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ktlint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Cache ktlint
        id: cache-ktlint
        uses: actions/cache@v5.0.5
        with:
          path: ktlint
          key: ktlint-1.1.1

      - name: Download ktlint
        if: steps.cache-ktlint.outputs.cache-hit != 'true'
        run: |
          curl -sSLO https://github.com/pinterest/ktlint/releases/download/1.1.1/ktlint
          chmod +x ktlint

      - name: Ensure ktlint is executable
        run: chmod +x ktlint

      - name: Run ktlint
        run: |
          mkdir -p build
          ./ktlint --reporter=checkstyle,output=build/ktlint-report.xml 'app/src/**/*.kt' || true

      - name: Upload ktlint report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ktlint-report
          path: build/ktlint-report.xml

  dependency-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Java 17
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Check dependencies
        run: |
          if ./gradlew help --task dependencyUpdates --no-daemon > /dev/null 2>&1; then
            ./gradlew dependencyUpdates --no-daemon
          else
            ./gradlew dependencies --no-daemon
          fi

  size-report:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Java 17
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --parallel --build-cache --stacktrace

      - name: Get APK size
        id: apk-size
        run: |
          SIZE=$(du -sh app/build/outputs/apk/debug/*.apk | cut -f1)
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          du -sh app/build/outputs/apk/debug/*.apk

      - name: Comment APK size on PR
        uses: actions/github-script@v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const size = '${{ steps.apk-size.outputs.size }}';
            const body = `## APK Size Report\n\n| Build | Size |\n|-------|------|\n| Debug APK | ${size} |`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });
