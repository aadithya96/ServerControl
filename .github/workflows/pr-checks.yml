name: PR Checks

on:
  pull_request:
    branches:
      - main

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Runs in parallel with build and test
  lint:
    name: Lint (ktlint + Android)
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Cache ktlint
        id: cache-ktlint
        uses: actions/cache@v5.0.5
        with:
          path: ktlint
          key: ktlint-1.1.1

      - name: Download ktlint
        if: steps.cache-ktlint.outputs.cache-hit != 'true'
        run: |
          curl -sSLO https://github.com/pinterest/ktlint/releases/download/1.1.1/ktlint
          chmod +x ktlint

      - name: Ensure ktlint is executable
        run: chmod +x ktlint

      - name: Run ktlint
        run: |
          mkdir -p build
          ./ktlint --reporter=checkstyle,output=build/ktlint-report.xml 'app/src/**/*.kt' || true

      - name: Set up Java 17
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run Android lint
        run: ./gradlew lint --no-daemon --parallel --build-cache --stacktrace || true

      - name: Upload lint reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-reports
          path: |
            build/ktlint-report.xml
            app/build/reports/lint-results-debug.html

  # Runs in parallel with lint and test — APK artifact reused by size-report
  build:
    name: Build Debug APK
    runs-on: self-hosted
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Java 17
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --parallel --build-cache --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk

  # Runs in parallel with lint and build
  test:
    name: Unit Tests
    runs-on: self-hosted
    timeout-minutes: 20
    permissions:
      checks: write
      contents: read
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Java 17
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon --parallel --build-cache --stacktrace

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: app/build/reports/tests/

      - name: Publish test report
        uses: dorny/test-reporter@v3.0.0
        if: always()
        with:
          name: Unit Tests
          reporter: java-junit
          path: app/build/test-results/**/*.xml
          fail-on-error: 'false'

  # Waits for build, then just measures — no Gradle run needed
  size-report:
    name: APK Size Report
    runs-on: self-hosted
    needs: [build]
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: debug-apk
          path: apk/

      - name: Get APK size
        id: apk-size
        run: |
          SIZE=$(du -sh apk/*.apk | cut -f1)
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          du -sh apk/*.apk

      - name: Comment APK size on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const size = '${{ steps.apk-size.outputs.size }}';
            const body = `## APK Size Report\n\n| Build | Size |\n|-------|------|\n| Debug APK | ${size} |`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });

  # Runs in parallel with lint, build, and test
  dependency-check:
    name: Dependency Check
    runs-on: self-hosted
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Java 17
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Check dependencies
        run: |
          if ./gradlew help --task dependencyUpdates --no-daemon > /dev/null 2>&1; then
            ./gradlew dependencyUpdates --no-daemon
          else
            ./gradlew dependencies --no-daemon
          fi
